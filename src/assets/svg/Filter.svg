<svg
  width="100%"
  height="300"
  viewBox="0 0 800 300"
  xmlns="http://www.w3.org/2000/svg"
>

  <defs>
    <linearGradient id="softBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="780" height="280" rx="22" fill="url(#softBg)" stroke="#E2E8F0"/>

  <!-- Fake filter dropdown -->
  <g transform="translate(300 55)">
    <rect width="200" height="36" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="16" y="23" font-size="13" fill="#94A3B8" font-family="Inter, Arial">
      Select filters
    </text>
    <path d="M172 14 L180 22 L188 14" stroke="#94A3B8" stroke-width="2" fill="none"/>

    <!-- Dropdown pulse -->
    <rect width="200" height="36" rx="8" fill="none" stroke="url(#accent)" opacity="0.6">
      <animate attributeName="opacity" from="0.2" to="0.8" dur="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Cursor -->
  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      from="420 140"
      to="380 70"
      dur="2.2s"
      repeatCount="indefinite"
      direction="alternate"
    />
    <path
      d="M0 0 L0 26 L6 20 L12 34 L18 32 L12 18 L22 18 Z"
      fill="#334155"
    />
  </g>

  <!-- Floating chips -->
  <g fill="#E0E7FF">
    <rect x="230" y="150" rx="12" width="80" height="28">
      <animateTransform type="translate" from="0 0" to="0 -8" dur="2s" repeatCount="indefinite" direction="alternate"/>
    </rect>
    <rect x="360" y="155" rx="12" width="96" height="28">
      <animateTransform type="translate" from="0 0" to="0 -10" dur="2.3s" repeatCount="indefinite" direction="alternate"/>
    </rect>
    <rect x="500" y="148" rx="12" width="72" height="28">
      <animateTransform type="translate" from="0 0" to="0 -7" dur="1.9s" repeatCount="indefinite" direction="alternate"/>
    </rect>
  </g>

  <!-- Main message -->
  <text
    x="400"
    y="215"
    text-anchor="middle"
    font-size="17"
    font-weight="600"
    fill="#334155"
    font-family="Inter, Segoe UI, Arial"
  >
    Select filters to explore data
  </text>

  <!-- Helper -->
  <text
    x="400"
    y="238"
    text-anchor="middle"
    font-size="13"
    fill="#64748B"
    font-family="Inter, Segoe UI, Arial"
  >
    Click above to refine your results
    <animate attributeName="opacity" from="0.4" to="1" dur="1.5s" repeatCount="indefinite" direction="alternate"/>
  </text>

</svg>
